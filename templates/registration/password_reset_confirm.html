{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}Enter a new password{% endblock title %}

{% block content %}
    <h1>Enter a new password!</h1>
    <form method="post">
      {% csrf_token %}
      {{ form|crispy }}
      <button type="submit" class="btn btn-primary">Change Password</button>
    </form>
{% endblock content %}
