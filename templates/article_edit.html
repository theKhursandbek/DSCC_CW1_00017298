{% extends "base.html" %}

{% load crispy_forms_tags %}

{% block content %}
    <h1>Edit</h1>
    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        {{ form.media }}
        {{ form|crispy }}
        <button type="submit" class="btn btn-primary">Save Changes</button>
        <a href="{% url 'article_list' %}" class="btn btn-outline-secondary ms-2">Cancel</a>
    </form>
{% endblock content %}
