name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ===== Job 1: Lint & Test =====
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: testdb
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U testuser -d testdb"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Code quality check (flake8)
        run: flake8 .

      - name: Run tests
        env:
          SECRET_KEY: test-secret-key-for-ci-pipeline-only
          DEBUG: "True"
          DATABASE_URL: postgres://testuser:testpass@localhost:5432/testdb
          ALLOWED_HOSTS: localhost,127.0.0.1
        run: pytest --tb=short -q

  # ===== Job 2: Build & Push Docker Image =====
  build-and-push:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/dscc-cw1-00017298:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/dscc-cw1-00017298:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ===== Job 3: Deploy to Server =====
  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ~/dscc-cw1-00017298

            # Update compose/config files on the server
            git fetch origin main
            git reset --hard origin/main

            # Use HTTPS nginx config (cert already on server)
            cp nginx/nginx.https.conf nginx/nginx.conf

            # Pull latest images
            docker compose pull

            # Restart services with zero downtime
            docker compose up -d --force-recreate

            # Run database migrations
            docker compose exec -T web python manage.py migrate --noinput

            # Collect static files
            docker compose exec -T web python manage.py collectstatic --noinput

            # Clean up old images
            docker image prune -f
